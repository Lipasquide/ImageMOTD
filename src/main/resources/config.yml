combat:
  inactivity-timeout-seconds: 10
  min-hits-to-save: 2

storage:
  retention-days: 7
  cleanup-interval-hours: 6
  max-replays-stored: 500

playback:
  default-speed: 1.0
  show-damage-indicators: true
  show-armor-info: true
  action-bar-progress: true
  hotbar:
    rewind:
      material: ARROW
      name: "&eGeri Sar (5s)"
    prev-hit:
      material: FEATHER
      name: "&bÖnceki Vuruş"
    play-pause:
      material: LIME_DYE
      name: "&aDuraklat / Başlat"
    next-hit:
      material: FEATHER
      name: "&bSonraki Vuruş"
    forward:
      material: ARROW
      name: "&eİleri Sar (5s)"
    speed:
      material: SUGAR
      name: "&dOynatma Hızı: %speed%x"
    exit:
      material: BARRIER
      name: "&cÇıkış"

messages:
  prefix: "&8[&bCombatReplay&8] "
  replay-not-found: "&cReplay not found."
  replay-started: "&aStarting replay..."
  replay-finished: "&aReplay finished."
  already-watching: "&cYou are already watching a replay."
